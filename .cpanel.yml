---
deployment:
  tasks:
    - export DEPLOYPATH=/home2/dry65/public_html/wp-content/themes/dry65/
    - /bin/rsync -av --exclude='.git' --exclude='.gitignore' --exclude='.cpanel.yml' --exclude='.DS_Store' --exclude='*.zip' --exclude='*.md' --exclude='.htaccess-snippet.txt' ./ $DEPLOYPATH
    - /bin/find $DEPLOYPATH -type d -exec chmod 755 {} \;
    - /bin/find $DEPLOYPATH -type f -exec chmod 644 {} \;
